name: lint
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Syntax check
        run: python -m py_compile claude_usage_indicator.py
      - name: Lint (advisory)
        run: |
          pip install ruff
          ruff check . || true
      - name: Shellcheck (advisory)
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shellcheck install.sh uninstall.sh run.sh || true
