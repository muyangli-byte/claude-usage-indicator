name: lint
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"   # 与运行环境一致（用户机为 3.8 / 旧 GNOME）
      - name: Syntax check (py_compile)
        run: python -m py_compile claude_usage_indicator.py cui/*.py tests/*.py
      - name: Lint (ruff — gates the build)
        run: |
          pip install ruff
          ruff check .
      - name: Tests (pytest)
        run: |
          pip install pytest
          python -m pytest tests/ -q
      - name: Shellcheck (advisory)
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shellcheck install.sh uninstall.sh run.sh || true
