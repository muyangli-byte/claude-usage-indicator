name: rust-release
# 发布 Release 时构建 Rust 二进制并作为资产上传，供 `cui --self-update` / 迁移安装器下载。
# 只在 release published / 手动 dispatch 时运行（分支 push 不触发）。
#
# 为什么在容器里【原生】编而不用 cargo-zigbuild：fltk(弹窗 GUI)的 C++ 和它要链的桌面库
# (X11/pango/Xft/cairo/fontconfig)无法用 zig 交叉工具链编/链。改为在 manylinux_2_28
# (AlmaLinux8, glibc 2.28)容器里用 gcc-toolset 原生编 → glibc 底线天然 = 2.28（与已迁移
# 的客户端一致、不回退），libstdc++ 由 fltk-rs 静态链(无 GLIBCXX 运行时依赖)。本机同容器已验证。
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # action-gh-release 需写权限往 Release 上传资产

env:
  GLIBC_FLOOR: "2.28"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Pre-deps (git/tar for checkout in this minimal container)
        run: dnf install -y git tar gzip || true
      - uses: actions/checkout@v4
      - name: System deps (FLTK X11/pango + BoringSSL clang/llvm + modern cmake)
        run: |
          dnf install -y dnf-plugins-core || true
          dnf config-manager --set-enabled powertools 2>/dev/null \
            || dnf config-manager --set-enabled crb 2>/dev/null || true
          dnf install -y epel-release || true
          dnf install -y --setopt=install_weak_deps=False \
            libX11-devel libXext-devel libXft-devel libXinerama-devel libXcursor-devel \
            libXrender-devel libXfixes-devel pango-devel cairo-devel fontconfig-devel \
            clang llvm-devel make gcc gcc-c++ binutils
          /opt/python/cp311-cp311/bin/pip install cmake
      - name: Rust toolchain
        run: curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
      - name: Build (native @ glibc 2.28) + gates + checksum
        working-directory: rust
        env:
          LIBCLANG_PATH: /usr/lib64
          CMAKE: /opt/python/cp311-cp311/bin/cmake
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build -p cui --release --locked        # 默认 features = prod 身份；原生 → glibc 2.28
          bin="target/release/cui"
          # ── 闸门 1：glibc 底线不得超过 2.28 ──
          floor=$(objdump -T "$bin" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -uV | tail -1)
          echo "measured glibc floor: ${floor:-none} (target ${GLIBC_FLOOR})"
          if [ -n "$floor" ] && [ "$(printf '%s\n%s\n' "$GLIBC_FLOOR" "$floor" | sort -V | tail -1)" != "$GLIBC_FLOOR" ]; then
            echo "::error::glibc floor $floor exceeds target $GLIBC_FLOOR — would strand older distros"; exit 1
          fi
          # ── 闸门 2：prod 二进制不得含 dev 身份串 ──
          if strings "$bin" | grep -qE 'claude-usage-indicator-dev|\[dev\]'; then
            echo "::error::prod binary contains dev-identity tokens (claude-usage-indicator-dev / [dev])"; exit 1
          fi
          arch=$(uname -m)                              # x86_64 — 与 selfupdate.rs 对齐
          strip "$bin"
          cp "$bin" "cui-${arch}-linux"
          sha256sum "cui-${arch}-linux" > "cui-${arch}-linux.sha256"
          cat "cui-${arch}-linux.sha256"
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust/cui-*-linux
            rust/cui-*-linux.sha256
      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cui-linux
          path: |
            rust/cui-*-linux
            rust/cui-*-linux.sha256
