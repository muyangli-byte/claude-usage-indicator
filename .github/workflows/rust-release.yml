name: rust-release
# 发布 Release 时构建 Rust 二进制并作为资产上传，供 `cui --self-update` / 迁移安装器下载。
# 只在 release published / 手动 dispatch 时运行（分支 push 不触发）。
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # action-gh-release 需写权限往 Release 上传资产(默认 GITHUB_TOKEN 只读 → 403)

env:
  # 已锁迁移决策(§11.1)：用 cargo-zigbuild 把 glibc 底线钉到 2.28（与 runner 镜像无关），
  # CI 实测超标即 fail —— 杜绝 runner 升级导致底线悄悄抬高、把老发行版排除掉。
  GLIBC_FLOOR: "2.28"
  ZIGTARGET: x86_64-unknown-linux-gnu.2.28

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System deps (BoringSSL bindings need cmake + libclang)
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev binutils
      - name: Install zig + cargo-zigbuild (pins glibc floor independent of the runner image)
        run: |
          pip install ziglang
          cargo install cargo-zigbuild --locked
      - name: Build (prod identity, glibc ${{ env.GLIBC_FLOOR }})
        working-directory: rust
        run: cargo zigbuild -p cui --release --target "$ZIGTARGET"   # 默认 features = prod 身份
      - name: Gate — glibc floor must not exceed ${{ env.GLIBC_FLOOR }}
        working-directory: rust
        run: |
          bin="target/x86_64-unknown-linux-gnu/release/cui"
          floor=$(objdump -T "$bin" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -uV | tail -1)
          echo "measured glibc floor: ${floor:-none} (target ${GLIBC_FLOOR})"
          if [ -n "$floor" ] && [ "$(printf '%s\n%s\n' "$GLIBC_FLOOR" "$floor" | sort -V | tail -1)" != "$GLIBC_FLOOR" ]; then
            echo "::error::glibc floor $floor exceeds target $GLIBC_FLOOR — would strand older distros"; exit 1
          fi
      - name: Gate — no dev-identity tokens in the prod binary
        working-directory: rust
        run: |
          bin="target/x86_64-unknown-linux-gnu/release/cui"
          if strings "$bin" | grep -qE 'rust-dev|\[rust\]'; then
            echo "::error::prod binary contains dev-identity tokens (rust-dev / [rust])"; exit 1
          fi
      - name: Stage artifact + SHA256 checksum
        working-directory: rust
        run: |
          arch=$(uname -m)                       # x86_64 — 与 std::env::consts::ARCH / selfupdate.rs 对齐
          bin="target/x86_64-unknown-linux-gnu/release/cui"
          strip "$bin"
          cp "$bin" "cui-${arch}-linux"
          sha256sum "cui-${arch}-linux" > "cui-${arch}-linux.sha256"
          cat "cui-${arch}-linux.sha256"
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust/cui-*-linux
            rust/cui-*-linux.sha256
      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cui-linux
          path: |
            rust/cui-*-linux
            rust/cui-*-linux.sha256
